<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Wyszukiwarka Litanii</title>
    <link rel="stylesheet" href="./litania.css" />
  </head>

  <body>
    <div>
      <h1>Witam w wyszukiwarce litanii.</h1>
      <h2>Poniżej wpisz imię świętego lub nazwę litanii.</h2>
    </div>
    <div>
      <input
        type="text"
        id="search"
        placeholder="Szukaj..."
        autocomplete="off"
        onkeyup="search()"
      />
      <ul id="results"></ul>
    </div>

    <script>
      let litanie = [];

      fetch("litanie.json")
        .then((res) => res.json())
        .then((data) => {
          litanie = data;
          console.log("Pobrano litanie:", litanie); // Log dla sprawdzenia czy dane są
        })
        .catch((error) => {
          console.error(
            "Błąd pobierania danych (sprawdź czy używasz serwera lokalnego):",
            error,
          );
        });

      function search() {
        const query = document.getElementById("search").value.toLowerCase();
        const results = document.getElementById("results");

        results.innerHTML = "";

        const filtered = litanie.filter((item) =>
          item.name.toLowerCase().includes(query),
        );

        filtered.forEach((item) => {
          const li = document.createElement("li");
          const link = document.createElement("a");
          link.textContent = item.name;
          // Tworzymy link do podstrony, przekazując nazwę litanii jako parametr URL
          link.href = `litania-szczegoly.html?name=${encodeURIComponent(item.name)}`;
          li.appendChild(link);
          results.appendChild(li);
        });
      }
    </script>
  </body>
</html>
